<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ร้านสัตว์เลี้ยงลึกลับ 🐾</title>
  <meta name="description" content="ค้นหาสัตว์เลี้ยงที่เกิดมาเพื่อเจ้า"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ===== SCENE 1: STORY INTRO ===== -->
  <section id="scene-intro" class="scene active mood-1">
    <div class="rain" id="rain"></div>
    <div class="steam" id="steam">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="vignette"></div>
    <div class="story-content">
      <p class="story-text" id="storyText"></p>
      <button class="btn-next" id="storyNext">ต่อไป →</button>
      <div class="story-dots" id="storyDots"></div>
    </div>
  </section>

  <!-- ===== SCENE 2: CHAT (warm-up + questions) ===== -->
  <section id="scene-chat" class="scene">
    <div class="chat-container">
      <div class="chat-header">
        <img class="npc-avatar" src="assets/characters/shopkeeper.webp" alt="เจ้าของร้าน"/>
        <span class="npc-name">เจ้าของร้าน</span>
      </div>
      <div class="chat-scroll" id="chatScroll">
        <div class="chat-messages" id="chatMessages">
          <!-- messages injected by JS -->
        </div>
        <div class="chat-choices" id="chatChoices">
          <!-- choice buttons injected by JS -->
        </div>
      </div>
    </div>
  </section>

  <!-- ===== SCENE 3: RESULT ===== -->
  <section id="scene-result" class="scene">
    <div class="result-sparkles" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>

    <div class="result-content">
      <p class="result-intro">เพื่อนที่รอเจอเราอยู่...</p>

      <div class="result-image-wrap">
        <div class="result-spotlight"></div>
        <img class="result-image" id="resultImage" src="" alt="Result"/>
      </div>

      <h2 class="result-name" id="resultName"></h2>
      <p class="result-tagline" id="resultTagline"></p>

      <div class="result-traits" id="resultTraits"></div>

      <div class="result-section">
        <h3>🐾 เจ้าหนูนี้เป็นยังไง?</h3>
        <p class="result-text" id="resultPetIs"></p>
      </div>

      <div class="result-section">
        <h3>🫧 แล้วเราล่ะ?</h3>
        <p class="result-text" id="resultYouAre"></p>
      </div>

      <div class="result-section result-gentle-section">
        <h3>💭 อยากกระซิบเบาๆ</h3>
        <p class="result-text" id="resultGentle"></p>
      </div>

      <div class="result-section result-compatible-section">
        <h3>✨ เพื่อนที่จองเราด้วย</h3>
        <p class="result-subhint">นอกจากเพื่อนหลักแล้ว ยังมีอีกหลายคนที่เข้ากับเราได้</p>
        <div class="compatible-list" id="resultCompatible"></div>
      </div>

      <div class="result-shopkeeper">
        <img src="assets/characters/shopkeeper.webp" alt="เจ้าของร้าน"/>
        <div class="bubble" id="resultNpcLine"></div>
      </div>

      <!-- เก็บไว้ใช้ภายหลัง (ตอนนี้ hide) -->
      <p class="result-description" id="resultDescription" style="display:none"></p>

      <div class="result-actions">
        <button class="btn-share" id="btnShare">📸 บันทึกภาพ</button>
        <button class="btn-restart" onclick="location.reload()">ทำอีกครั้ง</button>
      </div>
    </div>
  </section>

  <!-- ===== WHITE FLASH OVERLAY ===== -->
  <div class="flash" id="flash"></div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
