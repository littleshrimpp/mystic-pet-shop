<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ร้านสัตว์เลี้ยงลึกลับ 🐾</title>
  <meta name="description" content="มีเพื่อนตัวนึงรอเจอเราอยู่"/>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="512x512" href="assets/favicon.png"/>
  <link rel="apple-touch-icon" href="assets/favicon.png"/>
  <link rel="stylesheet" href="landing.css"/>
</head>
<body>

  <div class="rain" id="rain"></div>
  <div class="vignette"></div>

  <main class="landing">
    <div class="landing-inner">
      <div class="shop-sign">
        <span class="sign-text">ร้านสัตว์เลี้ยง</span>
      </div>

      <img class="hero-avatar" src="assets/characters/shopkeeper.png" alt="เจ้าของร้าน"/>

      <h1 class="landing-title">ร้านสัตว์เลี้ยงลึกลับ</h1>
      <p class="landing-sub">ค่ำคืนที่มีใครบางตัวกำลังรอเราอยู่</p>

      <p class="landing-story">
        ค่ำคืนนี้... ฝนเริ่มตกปรอยๆ<br/>
        ระหว่างทางกลับบ้าน<br/>
        <i>มีซอยเล็กๆ ที่ไม่เคยเห็นมาก่อน...</i>
      </p>

      <a class="btn-enter" href="chat/">
        <span>เริ่มค่ำคืนนี้</span>
      </a>

      <p class="landing-hint">ใช้เวลาประมาณ 3-5 นาที</p>
      <p class="landing-privacy">เราไม่เก็บข้อมูลส่วนตัวของคุณ ทุกอย่างอยู่แค่ในเครื่องคุณเท่านั้น</p>
    </div>
  </main>

</body>
</html>
